name: Build & Deploy Flatris

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Install node 18 if not present
            node -v || (curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash - && sudo apt-get install -y nodejs)
            
            # Install pm2 globally
            pm2 -v || sudo npm install -g pm2
            
            # Clone or pull latest code
            if [ -d "/home/ubuntu/flatris" ]; then
              cd /home/ubuntu/flatris
              git pull origin main
            else
              git clone https://github.com/${{ secrets.GITHUB_REPO }} /home/ubuntu/flatris
              cd /home/ubuntu/flatris
            fi
            
            # Install and build
            cd /home/ubuntu/flatris
            npm install
            npm run build
            
            # Start or restart with pm2
            pm2 describe flatris > /dev/null 2>&1 \
              && pm2 restart flatris \
              || pm2 start "npm run start" --name flatris
            
            # Save pm2 process list to survive reboots
            pm2 save
            sudo pm2 startup systemd -u ubuntu --hp /home/ubuntu