name: CI/CD — Build & Deploy Flatris to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.6.0
  NODE_VERSION: 18   # ✅ Updated

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Build
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install deps
        run: yarn install

      - name: Build app
        run: |
          cd web
          yarn install
          yarn build
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: flatris-build
          path: web/build/   # ✅ FIXED

  # ─────────────────────────────────────────
  # JOB 2: Terraform
  # ─────────────────────────────────────────
  terraform:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Apply
        run: terraform apply -auto-approve tfplan

      - name: Outputs
        id: tf
        run: |
          echo "bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "url=$(terraform output -raw cloudfront_url)" >> $GITHUB_OUTPUT

    outputs:
      bucket: ${{ steps.tf.outputs.bucket }}
      cf_id: ${{ steps.tf.outputs.cf_id }}
      url: ${{ steps.tf.outputs.url }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: flatris-build
          path: build/

      - name: Upload to S3
        run: |
          aws s3 sync build/ s3://${{ needs.terraform.outputs.bucket }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cf_id }} \
            --paths "/*"

      - name: Show URL
        run: |
          echo "🎮 Live URL: ${{ needs.terraform.outputs.url }}"